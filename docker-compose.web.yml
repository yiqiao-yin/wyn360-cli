services:
  wyn360-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${WYN360_WEB_PORT:-8360}:8360"
    restart: unless-stopped

# No secrets needed -- users enter their own API keys in the terminal.
# To run locally:
#   docker compose -f docker-compose.web.yml up --build
#   Open http://localhost:8360
